spring.config.import=optional:secret.properties

spring.application.name=intern-hub-backend

spring.datasource.url=${POSTGRES_DATASOURCE}
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME}
redis.keys.vacancy.time-to-live=2h

springdoc.override-with-generic-response=false

security.jwt.secret=${JWT_SECRET_KEY}
security.jwt.accessTokenExpirationTime=${JWT_ACCESS_TOKEN_EXPIRATION_TIME}
security.jwt.refreshTokenExpirationTime=${JWT_REFRESH_TOKEN_EXPIRATION_TIME}
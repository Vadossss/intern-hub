spring.config.import=optional:secret.properties

spring.application.name=intern-hub-backend

spring.datasource.url=${POSTGRES_DATASOURCE}
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=500

springdoc.override-with-generic-response=false

security.jwt.secret=${JWT_SECRET_KEY}
security.jwt.accessTokenExpirationTime=${JWT_ACCESS_TOKEN_EXPIRATION_TIME}
security.refreshTokenExpirationTime=${JWT_REFRESH_TOKEN_EXPIRATION_TIME}